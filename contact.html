<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Fonts poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- bootstrap Link -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- My CSS -->
    <link rel="stylesheet" href="Css/style.css">

</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">

            <a class="navbar-brand" href="#">DastarKhwan</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mynavbar">
                <ul class="navbar-nav mx-auto gap-2">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="menu.html">Menu</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About Us</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="contact.html">Contact Us</a>
                    </li>
                </ul>

                <a class="btn nav-btn" href="">Book Table</a>
            </div>


        </div>
    </nav>


    <section>
        <div class="container">


            <h1 class="hero-heading text-center">Contact Us</h1>
            <p class="hero-para text-center">
                We'd love to hear from you. Get in touch with us today. </p>



            <div class="row g-5 mt-4">

                <!-- Contact Form -->
                <div class="col-12 col-lg-7">

                    <div class="card">
                        <div class="card-body p-4">

                            <h3 class="food-title mb-4">Send Us A Message</h3>

                            <form id="contactForm">

                                <div class="mb-3">
                                    <input id="name" type="text" class="form-control" placeholder="Your Name">
                                    <span id="namespan" class="text-danger small"></span>
                                </div>

                                <div class="mb-3">
                                    <input id="email" type="email" class="form-control" placeholder="Your Email">
                                    <span id="emailspan" class="text-danger small"></span>
                                </div>

                                <div class="mb-3">
                                    <input id="subject" type="text" class="form-control" placeholder="Subject">
                                    <span id="subjectspan" class="text-danger small"></span>
                                </div>

                                <div class="mb-3">
                                    <textarea id="message" class="form-control" rows="5"placeholder="Your Message"></textarea>
                                    <span id="messagespan" class="text-danger small"></span>
                                </div>

                                <button type="submit" class="btn primary-btn">
                                    Send Message
                                </button>

                            </form>

                        </div>
                    </div>

                </div>

                <!-- Contact Info -->
                <div class="col-12 col-lg-5">

                    <div class="card h-100">
                        <div class="card-body p-4">

                            <h3 class="food-title mb-4">Get In Touch</h3>

                            <p>
                                <i class="bi bi-geo-alt-fill"></i> 123 Food Street, Karachi, Pakistan
                            </p>

                            <p>
                                <i class="bi bi-telephone-fill"></i> +92 300 1234567
                            </p>

                            <p>
                                <i class="bi bi-envelope-fill"></i> info@dastarkhwan.com
                            </p>

                            <p>
                                <i class="bi bi-clock-fill"></i> Mon - Sun: 10 AM - 11 PM
                            </p>

                        </div>
                    </div>

                </div>

            </div>






        </div>
    </section>



    <!-- Bootstrap js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- my js link -->
    <script src="JS/script.js"></script>

</body>

</html>
